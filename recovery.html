<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperación Cuenta</title>
    <link rel="stylesheet" href="/CSS/styles.css">
    <link rel="stylesheet" href="/CSS/recovery.css">
    <script type="module" src="/JS/auth/recovery.js" defer></script>
</head>
<body>
    <form class="formDatos">
        <select class="tipoDoc" name="tipoDoc">
            <option value="" disabled selected>tipo de documento</option>
            <option value="cc">Cédula de ciudadanía</option>
            <option value="ti">Tarjeta de identidad</option>
            <option value="ce">Cédula de extranjería</option>
            <option value="pasaporte">Pasaporte</option>
        </select>
        <p class="error" id="errorTipoDoc"></p>

        <input type="text" class="numeroDoc" placeholder="Número de identificación">
        <p class="error" id="errorNumDoc"></p>

        <input type="email" class="email" placeholder="Email">
        <p class="error" id="errorEmail"></p>


        <button type="submit" class="btnRecovery">Recuperar Contraseña</button>
        <button class="btnCancelar">cancelar</button>
    </form>

    <div class="formContraseña">
        <form>
            <input class="password" type="text" placeholder="ingrese una nueva contraseña">
            <p class="error" id="errorPassword"></p>

            <input class="password2" type="text" placeholder="ingrese nuevamente la contraseña ">
            <p class="error" id="errorPassword2"></p>
        </form>

        <button type="submit" class="btnChange">Cambiar Contraseña</button>
    </div>
</body>
</html>
