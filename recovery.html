<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperación Cuenta</title>
    <link rel="stylesheet" href="/CSS/styles.css">
    <link rel="stylesheet" href="/CSS/recovery.css">
    <script src="/JS/auth/recovery.js" defer></script>
</head>
<body>
    <form>
        <select class="tipoDoc" name="tipoDoc">
            <option value="" disabled selected>tipo de documento</option>
            <option value="cc">Cédula de ciudadanía</option>
            <option value="ti">Tarjeta de identidad</option>
            <option value="ce">Cédula de extranjería</option>
            <option value="pasaporte">Pasaporte</option>
        </select>
        <input type="text" class="numeroDoc" placeholder="Número de identificación">
        <input type="email" class="email" placeholder="Email">

        <button type="submit" class="">Recuperar Contraseña</button>
        <button class="btnCancelar">cancelar</button>
    </form>

    <div hidden>
        <form>
            <input type="text" placeholder="ingrese una nueva contraseña">
            <input type="text" placeholder="ingrese la nueva contraseña nuevamente">
        </form>

        <button type="submit" class="btnRecovery" href="/index.html">Cambiar Contraseña</button>
    </div>
</body>
</html>
